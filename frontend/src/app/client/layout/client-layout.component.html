<div class="client-layout" [class.sidebar-expanded]="isExpanded" [class.sidebar-collapsed]="!isExpanded">

  <!-- ── Sidebar ──────────────────────────────────────────────────────────── -->
  <aside class="sidebar" [class.mobile-open]="mobileOpen">
    <div class="sidebar-backdrop" (click)="closeMobile()"></div>
    <div class="sidebar-inner">

      <!-- Logo -->
      <div class="sidebar-header">
        <a class="sidebar-logo" routerLink="/client/dashboard">
          <span class="logo-mark">L</span>
          <span class="logo-text">Lex<em>Firma</em></span>
        </a>
        <button class="sidebar-collapse-btn" (click)="toggleSidebar()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
      </div>

      <div class="sidebar-divider"></div>

      <!-- Role pill -->
      <div class="sidebar-role">
        <span class="role-pill">Client Portal</span>
      </div>

      <!-- Navigation -->
      <nav class="sidebar-nav">
        <a class="nav-item" *ngFor="let item of menuItems"
           [routerLink]="item.route"
           routerLinkActive="nav-item--active"
           (click)="closeMobile()"
           [title]="!isExpanded ? item.label : ''">
          <span class="nav-icon" [innerHTML]="item.svg"></span>
          <span class="nav-label">{{ item.label }}</span>
          <!-- Unread badge on Messages -->
          <span class="nav-badge" *ngIf="item.badge && unreadCount > 0">{{ unreadCount > 9 ? '9+' : unreadCount }}</span>
          <span class="nav-active-dot"></span>
        </a>
      </nav>

      <div class="sidebar-spacer"></div>
      <div class="sidebar-divider"></div>

      <!-- Logout -->
      <button class="nav-item nav-item--logout" (click)="logout()">
        <span class="nav-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </span>
        <span class="nav-label">Sign Out</span>
      </button>

    </div>
  </aside>

  <!-- ── Main area ─────────────────────────────────────────────────────────── -->
  <div class="main-wrap">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="topbar-btn topbar-hamburger" (click)="openMobile()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="topbar-breadcrumb">
          <span class="breadcrumb-root">Client</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="breadcrumb-sep"><polyline points="9 18 15 12 9 6"/></svg>
          <span class="breadcrumb-current">{{ currentPageLabel }}</span>
        </div>
      </div>

      <div class="topbar-right">
        <span class="topbar-date">{{ today | date:'EEE, d MMM yyyy' }}</span>
        <span class="topbar-divider"></span>

        <!-- Message bell -->
        <button class="topbar-btn topbar-bell" routerLink="/client/messages" title="Messages">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="bell-dot" *ngIf="unreadCount > 0">{{ unreadCount > 9 ? '9+' : unreadCount }}</span>
        </button>

        <span class="topbar-divider"></span>

        <!-- User pill -->
        <div class="user-menu-wrap" [class.open]="userMenuOpen">
          <button class="user-pill" (click)="toggleUserMenu()">
            <span class="user-avatar">{{ userInitials }}</span>
            <span class="user-name">{{ userName }}</span>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="user-chevron"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="user-dropdown" *ngIf="userMenuOpen">
            <button class="user-dropdown-item user-dropdown-item--danger" (click)="logout()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
              Sign Out
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Page content -->
    <main class="content-area">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
