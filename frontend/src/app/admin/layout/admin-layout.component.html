<div class="admin-layout">
  <!-- Sidebar -->
  <mat-sidenav-container class="sidenav-container">
    <mat-sidenav #sidenav [opened]="isExpanded" mode="side" class="sidenav"
                 [class.expanded]="isExpanded" [class.collapsed]="!isExpanded">

      <!-- Logo -->
      <div class="sidebar-header">
        <mat-icon class="logo-icon">gavel</mat-icon>
        <span class="logo-text" *ngIf="isExpanded">LawFirm Pro</span>
      </div>

      <mat-divider></mat-divider>

      <!-- Navigation -->
      <mat-nav-list class="nav-list">
        <a mat-list-item *ngFor="let item of menuItems"
           [routerLink]="item.route"
           routerLinkActive="active-link"
           [matTooltip]="!isExpanded ? item.label : ''"
           matTooltipPosition="right">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle *ngIf="isExpanded">{{ item.label }}</span>
        </a>
      </mat-nav-list>

      <mat-divider></mat-divider>

      <!-- Logout -->
      <mat-nav-list>
        <a mat-list-item (click)="logout()" class="logout-item"
           [matTooltip]="!isExpanded ? 'Logout' : ''" matTooltipPosition="right">
          <mat-icon matListItemIcon>logout</mat-icon>
          <span matListItemTitle *ngIf="isExpanded">Logout</span>
        </a>
      </mat-nav-list>
    </mat-sidenav>

    <!-- Main Content -->
    <mat-sidenav-content class="main-content">
      <!-- Top Toolbar -->
      <mat-toolbar class="top-toolbar">
        <button mat-icon-button (click)="toggleSidebar()">
          <mat-icon>{{ isExpanded ? 'menu_open' : 'menu' }}</mat-icon>
        </button>
        <span class="toolbar-title">Admin Panel</span>
        <span class="spacer"></span>
        <button mat-icon-button [matMenuTriggerFor]="userMenu">
          <mat-icon>account_circle</mat-icon>
        </button>
        <mat-menu #userMenu="matMenu">
          <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon>
            <span>Logout</span>
          </button>
        </mat-menu>
      </mat-toolbar>

      <!-- Router Outlet -->
      <div class="content-area">
        <router-outlet></router-outlet>
      </div>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
